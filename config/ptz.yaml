# 云台 PD 跟踪（ZDT_X42S / Emm 固件，参考 utils/Ptz_X42S.py）

ptz:
  serial_port: /dev/ttyS1
  yaw_id: 2
  pitch_id: 1
  yaw_ratio: 8.0
  pitch_ratio: 4.0
  baudrate: 115200
  default_speed: 300
  default_acceleration: 50

  # 每次启动执行双轴校准（堵转回中）
  calibrate_on_start: true
  pitch_calibrate_speed: 30
  pitch_calibrate_direction: CW    # CW | CCW
  pitch_back_angle: -60.0
  yaw_calibrate_speed: 30
  yaw_first_direction: CW
  yaw_stall_interval: 1.1
  yaw_second_stall_detect_delay: 2.0
  yaw_second_stall_min_travel_motor_deg: 30.0

  # 可选机械限位 (度)，null 表示不限
  yaw_limits: null
  pitch_limits: [-25.0, 35.0]

  # PD 控制（仅 P + D，无 I）
  frame_width: 640
  frame_height: 480
  center_x: 320.0
  center_y: 240.0
  deadzone_px: 20.0
  kp_yaw: 50
  kd_yaw: 5.0
  kp_pitch: 35
  kd_pitch: 5
  sign_yaw: 1.0       # 目标在画面右侧时 yaw 速度符号（水平反了则改正负）
  sign_pitch: -1.0
  max_speed_rpm: 80
  min_speed_rpm: 4
  control_hz: 15.0
  lost_stop_frames: 5   # 主目标连续丢失 N 周期后停云台

  # 无目标超时回中位（自上次见到主目标起计时）
  return_home_timeout_s: 10.0
  return_home_speed: 50
